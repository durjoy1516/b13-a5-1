<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GitHub Issues Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center">
        <div class="bg-white w-[400px] p-8 rounded-lg shadow">
            <div class="text-center mb-6">
                <img src="./assets/github-logo.png" class="w-12 mx-auto">
                <h1 class="text-xl font-semibold mt-2">GitHub Issues Tracker</h1>
                <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
            </div>

            <label class="text-sm">Username</label>
            <input id="username" class="w-full border p-2 rounded mt-1" placeholder="Enter username">
            <p class="text-purple-600 text-xs">Default: admin</p>

            <label class="text-sm mt-3 block">Password</label>
            <input id="password" type="password" class="w-full border p-2 rounded mt-1" placeholder="Enter password">
            <p class="text-purple-600 text-xs">Default: admin123</p>

            <button onclick="login()" class="w-full mt-4 py-2 rounded text-white bg-[#4a00ff] to-blue-500">Sign In</button>
            <p class="text-center text-gray-400 mt-3">OR</p>
            <div class="bg-gray-100 p-3 text-center text-sm rounded mt-3">
                <p><strong>Username:</strong> admin</p>
                <p><strong>Password:</strong> admin123</p>
            </div>
        </div>
    </div>



<!-- DASHBOARD -->
<div id="dashboardPage" class="hidden">  //will add hidden

    <!-- NAVBAR -->
    <div class="flex justify-between items-center p-4 border-b bg-white">
        <h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>

        <div class="flex gap-3">

            <!-- NEW ADDED -->
            <input 
            id="searchInput"
            oninput="searchIssue()" 
            placeholder="Search issues..." 
            class="border px-3 py-1 rounded">

            <!-- NEW ADDED -->
            <button onclick="addNewIssue()" class="bg-purple-600 text-white px-4 py-1 rounded">
                Add New Issue
            </button>

        </div>
    </div>

    <!-- TABS -->
    <div class="flex gap-3 p-6">
        <button onclick="changeTab('all', event)" class="tabBtn px-4 py-2 border rounded bg-purple-600 text-white">All</button>
        <button onclick="changeTab('open', event)" class="tabBtn px-4 py-2 border rounded">Open</button>
        <button onclick="changeTab('closed', event)" class="tabBtn px-4 py-2 border rounded">Closed</button>
    </div>

    <!-- ISSUE COUNT -->
    <div class="flex justify-between items-center px-6">
    
        <div>
            <img src="./assets/Aperture.png" alt="">
            <h2 id="issueCount" class="font-semibold">Issues</h2>
            <p class="text-gray-500 text-sm">Track and manage your project issues</p>
        </div>

        <div class="flex gap-4 text-sm">
            <span class="text-green-600">● Open</span>
            <span class="text-purple-600">● Closed</span>
        </div>

    </div>

    <!-- LOADER -->
    <div id="loader" class="text-center mt-6 hidden">
        <h2 class="font-bold text-2xl text-yellow-950">Loading...</h2>
    </div>

    <!-- ISSUE GRID -->
    <div id="issueContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-6">
    </div>

</div>

<!-- MODAL -->
<div id="modal" class="hidden">
</div>

<script src="script.js"></script>

</body>
</html>
